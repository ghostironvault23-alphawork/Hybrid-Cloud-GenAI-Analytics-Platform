<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A3A82"/>
      <stop offset="1" stop-color="#0078D4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7FBFF"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#E7F0FA" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0B2447" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 z" fill="#2563EB"/>
    </marker>
    <style>
      .title{font:700 34px Arial, sans-serif;fill:#fff}.sub{font:500 15px Arial,sans-serif;fill:#D7ECFF}
      .h{font:700 19px Arial,sans-serif;fill:#0F172A}.t{font:500 14px Arial,sans-serif;fill:#334155}.small{font:600 12px Arial,sans-serif;fill:#475569}
      .box{fill:url(#card);stroke:#BBD7F5;stroke-width:2;rx:18;filter:url(#shadow)}.inner{fill:#EFF6FF;stroke:#BFDBFE;stroke-width:1.5;rx:12}
      .pill{fill:#E0F2FE;stroke:#7DD3FC;stroke-width:1;rx:16}.arrow{stroke:#2563EB;stroke-width:3;marker-end:url(#arrow)}
      .azure{fill:#0078D4}.green{fill:#16A34A}.orange{fill:#F97316}.purple{fill:#7C3AED}
    </style>
  </defs>

  <rect width="1400" height="720" fill="#F8FBFF"/>
  <rect width="1400" height="720" fill="url(#grid)" opacity="0.9"/>
  <rect x="0" y="0" width="1400" height="78" fill="url(#header)"/>
  <path d="M46 26c10-18 25-18 35 0l28 48H18l28-48z" fill="#50B4F8" opacity=".95"/>
  <path d="M68 18l-24 42h48L68 18z" fill="#fff" opacity=".28"/>
  <text x="130" y="38" class="title">Azure Reference Architecture — Hybrid Cloud GenAI Analytics Platform</text>
  <text x="130" y="62" class="sub">Secure ingestion • Data Lake • RAG Retrieval • Azure OpenAI • Reports and Business Insights</text>

  <!-- Sources -->
  <rect x="35" y="135" width="210" height="430" class="box"/>
  <text x="70" y="170" class="h">Data Sources</text>
  <rect x="62" y="198" width="156" height="58" class="inner"/>
  <text x="86" y="223" class="t">Users / Admins</text>
  <text x="86" y="242" class="small">Web + API access</text>
  <rect x="62" y="277" width="156" height="58" class="inner"/>
  <text x="86" y="302" class="t">IoT Devices</text>
  <text x="86" y="321" class="small">Telemetry events</text>
  <rect x="62" y="356" width="156" height="58" class="inner"/>
  <text x="86" y="381" class="t">On-Prem Systems</text>
  <text x="86" y="400" class="small">Tickets + ERP logs</text>
  <rect x="62" y="435" width="156" height="58" class="inner"/>
  <text x="86" y="460" class="t">Public Cloud</text>
  <text x="86" y="479" class="small">Logs + metrics</text>

  <!-- Ingress -->
  <rect x="310" y="135" width="235" height="430" class="box"/>
  <text x="343" y="170" class="h">Ingress + API Layer</text>
  <rect x="338" y="203" width="178" height="66" class="inner"/>
  <circle cx="365" cy="236" r="17" class="azure"/>
  <text x="392" y="230" class="t">API Management</text>
  <text x="392" y="249" class="small">Routes + throttling</text>
  <rect x="338" y="292" width="178" height="66" class="inner"/>
  <circle cx="365" cy="325" r="17" class="purple"/>
  <text x="392" y="319" class="t">Azure AD B2C</text>
  <text x="392" y="338" class="small">Auth + RBAC</text>
  <rect x="338" y="381" width="178" height="66" class="inner"/>
  <circle cx="365" cy="414" r="17" class="orange"/>
  <text x="392" y="408" class="t">Event Grid / Hub</text>
  <text x="392" y="427" class="small">Event ingestion</text>

  <!-- Middle -->
  <rect x="610" y="115" width="330" height="470" class="box"/>
  <text x="657" y="150" class="h">Middle Layer Processing</text>
  <rect x="640" y="180" width="120" height="76" class="inner"/>
  <text x="668" y="210" class="t">Functions</text>
  <text x="660" y="231" class="small">Validation</text>
  <rect x="790" y="180" width="120" height="76" class="inner"/>
  <text x="822" y="210" class="t">Logic Apps</text>
  <text x="815" y="231" class="small">Workflows</text>
  <rect x="640" y="285" width="120" height="76" class="inner"/>
  <text x="670" y="315" class="t">App Service</text>
  <text x="664" y="336" class="small">FastAPI API</text>
  <rect x="790" y="285" width="120" height="76" class="inner"/>
  <text x="835" y="315" class="t">AKS</text>
  <text x="812" y="336" class="small">Scale option</text>
  <rect x="640" y="390" width="120" height="76" class="inner"/>
  <text x="665" y="420" class="t">Key Vault</text>
  <text x="655" y="441" class="small">Secrets + keys</text>
  <rect x="790" y="390" width="120" height="76" class="inner"/>
  <text x="809" y="420" class="t">App Insights</text>
  <text x="811" y="441" class="small">Monitoring</text>
  <rect x="690" y="495" width="170" height="56" class="pill"/>
  <text x="727" y="520" class="t">Data Factory</text>
  <text x="716" y="539" class="small">ETL + scheduling</text>

  <!-- Data -->
  <rect x="1005" y="115" width="220" height="470" class="box"/>
  <text x="1054" y="150" class="h">Data Layer</text>
  <rect x="1033" y="188" width="164" height="76" class="inner"/>
  <circle cx="1060" cy="223" r="17" class="green"/>
  <text x="1085" y="216" class="t">ADLS Gen2</text>
  <text x="1085" y="236" class="small">Data lake</text>
  <rect x="1033" y="307" width="164" height="76" class="inner"/>
  <circle cx="1060" cy="342" r="17" class="azure"/>
  <text x="1085" y="335" class="t">Cosmos DB</text>
  <text x="1085" y="355" class="small">Transactions</text>
  <rect x="1033" y="426" width="164" height="76" class="inner"/>
  <circle cx="1060" cy="461" r="17" class="purple"/>
  <text x="1085" y="454" class="t">Synapse SQL</text>
  <text x="1085" y="474" class="small">Warehouse</text>

  <!-- AI -->
  <rect x="1260" y="135" width="105" height="270" class="box"/>
  <text x="1286" y="168" class="h">AI</text>
  <rect x="1278" y="196" width="70" height="64" class="inner"/>
  <text x="1294" y="224" class="t">Azure</text>
  <text x="1289" y="244" class="small">OpenAI</text>
  <rect x="1278" y="292" width="70" height="64" class="inner"/>
  <text x="1295" y="320" class="t">AI</text>
  <text x="1290" y="340" class="small">Search</text>

  <!-- Output -->
  <rect x="1260" y="440" width="105" height="125" class="box"/>
  <text x="1277" y="472" class="h">Output</text>
  <text x="1282" y="507" class="t">Reports</text>
  <text x="1282" y="529" class="t">RCA</text>
  <text x="1282" y="551" class="t">Alerts</text>

  <!-- Arrows -->
  <line x1="245" y1="350" x2="310" y2="350" class="arrow"/>
  <line x1="545" y1="350" x2="610" y2="350" class="arrow"/>
  <line x1="940" y1="350" x2="1005" y2="350" class="arrow"/>
  <line x1="1225" y1="250" x2="1260" y2="250" class="arrow"/>
  <line x1="1313" y1="405" x2="1313" y2="440" class="arrow"/>

  <rect x="58" y="625" width="1284" height="58" rx="18" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="88" y="650" class="h">Deployment Summary</text>
  <text x="88" y="672" class="t">Azure services map the local MVP into production: API Management, App Service/Functions, ADLS Gen2, Cosmos DB, Azure OpenAI, AI Search, Key Vault, App Insights, and Power BI-ready outputs.</text>
</svg>
